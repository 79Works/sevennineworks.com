<!DOCTYPE html>
<html>
<head>
    <title>SevenNine Works | Coming Soon</title>
    <style>
        body {

            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
        }
        
        .content { text-align: center; padding: 40px; }
        
        .logo { 
            max-width: 250px; 
            height: auto;
            margin-bottom: 2rem;

        h1 { 
            font-size: 2.8rem; 
            margin-bottom: 0.5rem; 
            color: #d4af37; 
            letter-spacing: 1px;
            text-transform: uppercase; /* Gives it a solid, "Works" brand feel */
        }

        p { 
            color: #a3a3a3; 
            font-size: 1.1rem; 
            max-width: 450px;
            margin: 0 auto;
            line-height: 1.6;
            letter-spacing: 0.5px;
        }

</head>
<body>
    <div class="content">
        <img src="79Works_Logo2.png" alt="SevenNine Works Logo" class="logo">
        
        <h1>SevenNine Works</h1>

</html>
